[input]
# file = "tests/fixtures/large.txt"           # Одиночный файл
directory = "tests/fixtures"          # Каталог для поиска
# glob = "data/**/*.1c"              # Glob-паттерн
extensions = [".txt", ".1c"]         # Расширения для поиска
recursive = true                      # Рекурсивный поиск в подкаталогах
