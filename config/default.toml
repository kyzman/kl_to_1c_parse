# ════════════════════════════════════════════════════
# ⭐ Базовая конфигурация load1c
# ════════════════════════════════════════════════════

[includes]
files = ["includes/inputs.toml"]

# ════════════════════════════════════════════════════
# ⭐ Настройки парсера
# ════════════════════════════════════════════════════
[parser]
buffer_size = 65536
max_line_length = 32768
encoding_detection_size = 2048
detection_lines = 10

[parser.features]
progress_bar = true
line_limit_error = true
validate_checksums = false

# ════════════════════════════════════════════════════
# ⭐ Настройки вывода
# ════════════════════════════════════════════════════
[output]
format = "table"
verbose = false
# file = "output.txt"

# ⭐ Режим вывода статистики:
#   aggregated  - только общая (по умолчанию)
#   per_file    - только по каждому файлу
#   both        - и общая, и по каждому файлу
stats_mode = "both"

# ════════════════════════════════════════════════════
# ⭐ Настройки логирования
# ════════════════════════════════════════════════════
[logging]
level = "info"
# file = "logs/load1c.log"
