# ════════════════════════════════════════════════════
# ⭐ Базовая конфигурация load1c
# ════════════════════════════════════════════════════

# ⭐ Включение дополнительных конфигов
[includes]
files = []

# ════════════════════════════════════════════════════
# ⭐ Настройки парсера (обязательные)
# ════════════════════════════════════════════════════
[parser]
buffer_size = 65536              # 64 KB
max_line_length = 16384        # 16 KB
encoding_detection_size = 1024   # 1 KB
detection_lines = 10

[parser.features]
progress_bar = false
line_limit_error = true
validate_checksums = false

# ════════════════════════════════════════════════════
# ⭐ Настройки вывода (опциональные)
# ════════════════════════════════════════════════════
[output]
format = "table"    # table, json, csv
verbose = false
# file = "output.txt"

# ════════════════════════════════════════════════════
# ⭐ Настройки логирования (опциональные)
# ════════════════════════════════════════════════════
[logging]
level = "info"      # debug, info, warn, error
# file = "logs/load1c.log"
